<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode" id="main-body">

    <div class="browser-header">
        <div class="tab-bar" id="tab-bar">
            <div class="tab active" onclick="switchTab(0)">VMIN Home <span class="close-t">×</span></div>
            <button class="new-tab-btn" onclick="addTab()">+</button>
        </div>
        
        <div class="nav-bar">
            <div class="nav-buttons">
                <button onclick="goBack()">←</button>
                <button onclick="goForward()">→</button>
                <button onclick="reload()">↻</button>
            </div>
            <div class="address-container">
                <input type="text" id="url-input" placeholder="Search or enter URL...">
                <div id="adblock-toggle" class="shield off" onclick="toggleAdBlock()">🛡️</div>
            </div>
            <button class="menu-btn" onclick="toggleSettings()">⚙️</button>
        </div>
    </div>

    <div id="viewport-container">
        <div id="home-screen" class="main-content">
            <div class="logo">🦆</div>
            <h1>VMINawebsite</h1>
            <div class="grid-section">
                <span>⭐ Frequent Sites</span>
                <div id="user-grid" class="site-grid"></div>
            </div>
        </div>
        <iframe id="web-view" src="" style="display:none;"></iframe>
    </div>

    <div id="settings-panel" class="modal">
        <h3>Browser Settings</h3>
        <button onclick="setTheme('duck')">Duck Theme</button>
        <button onclick="setTheme('dark')">Dark Mode</button>
        <button onclick="closeSettings()">Close</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
